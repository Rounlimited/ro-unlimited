<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="sparkGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="sparkGlowHot">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="sparkCenter">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="40%" style="stop-color:#F5E6A3"/>
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Spark particles — each with class for individual GSAP targeting -->
  <!-- Hot white center -->
  <circle class="spark spark-core" cx="50" cy="50" r="4" fill="url(#sparkCenter)" filter="url(#sparkGlowHot)"/>
  <!-- Flying sparks (8 directions) -->
  <circle class="spark spark-1" cx="50" cy="50" r="1.5" fill="#F5E6A3" filter="url(#sparkGlow)"/>
  <circle class="spark spark-2" cx="50" cy="50" r="1.2" fill="#C9A84C" filter="url(#sparkGlow)"/>
  <circle class="spark spark-3" cx="50" cy="50" r="1.8" fill="#FFFFFF" filter="url(#sparkGlow)"/>
  <circle class="spark spark-4" cx="50" cy="50" r="1.0" fill="#F5E6A3" filter="url(#sparkGlow)"/>
  <circle class="spark spark-5" cx="50" cy="50" r="1.4" fill="#C9A84C" filter="url(#sparkGlow)"/>
  <circle class="spark spark-6" cx="50" cy="50" r="0.8" fill="#FFFFFF" filter="url(#sparkGlow)"/>
  <circle class="spark spark-7" cx="50" cy="50" r="1.6" fill="#F5E6A3" filter="url(#sparkGlow)"/>
  <circle class="spark spark-8" cx="50" cy="50" r="1.1" fill="#C9A84C" filter="url(#sparkGlow)"/>
</svg>