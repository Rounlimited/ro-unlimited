<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="craneGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A88A3D"/>
      <stop offset="50%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#D4B965"/>
    </linearGradient>
    <linearGradient id="craneSteelGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#8A7233;stop-opacity:0.7"/>
    </linearGradient>
    <filter id="craneGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- PART 1: BASE PLATFORM (id="crane-base") -->
  <g id="crane-base">
    <!-- Base plate -->
    <rect x="140" y="570" width="120" height="12" rx="1" fill="url(#craneSteelGold)" stroke="#C9A84C" stroke-width="1"/>
    <!-- Base feet -->
    <rect x="135" y="580" width="30" height="8" rx="1" fill="#C9A84C" opacity="0.7"/>
    <rect x="235" y="580" width="30" height="8" rx="1" fill="#C9A84C" opacity="0.7"/>
    <!-- Base bolts -->
    <circle cx="155" cy="576" r="2.5" fill="#C9A84C"/>
    <circle cx="245" cy="576" r="2.5" fill="#C9A84C"/>
    <!-- Turntable -->
    <ellipse cx="200" cy="568" rx="25" ry="5" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- PART 2: TOWER (id="crane-tower") — lattice truss structure -->
  <g id="crane-tower">
    <!-- Left rail -->
    <line x1="185" y1="570" x2="185" y2="120" stroke="#C9A84C" stroke-width="2"/>
    <!-- Right rail -->
    <line x1="215" y1="570" x2="215" y2="120" stroke="#C9A84C" stroke-width="2"/>
    <!-- Cross braces (X pattern repeating) -->
    <line x1="185" y1="570" x2="215" y2="530" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="215" y1="570" x2="185" y2="530" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="185" y1="530" x2="215" y2="490" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="215" y1="530" x2="185" y2="490" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="185" y1="490" x2="215" y2="450" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="215" y1="490" x2="185" y2="450" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="185" y1="450" x2="215" y2="410" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="215" y1="450" x2="185" y2="410" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="185" y1="410" x2="215" y2="370" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="215" y1="410" x2="185" y2="370" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="185" y1="370" x2="215" y2="330" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="215" y1="370" x2="185" y2="330" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="185" y1="330" x2="215" y2="290" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="215" y1="330" x2="185" y2="290" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="185" y1="290" x2="215" y2="250" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="215" y1="290" x2="185" y2="250" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="185" y1="250" x2="215" y2="210" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="215" y1="250" x2="185" y2="210" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="185" y1="210" x2="215" y2="170" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="215" y1="210" x2="185" y2="170" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="185" y1="170" x2="215" y2="130" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <line x1="215" y1="170" x2="185" y2="130" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
    <!-- Horizontal ties -->
    <line x1="185" y1="530" x2="215" y2="530" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
    <line x1="185" y1="490" x2="215" y2="490" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
    <line x1="185" y1="450" x2="215" y2="450" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
    <line x1="185" y1="410" x2="215" y2="410" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
    <line x1="185" y1="370" x2="215" y2="370" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
    <line x1="185" y1="330" x2="215" y2="330" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
    <line x1="185" y1="290" x2="215" y2="290" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
    <line x1="185" y1="250" x2="215" y2="250" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
    <line x1="185" y1="210" x2="215" y2="210" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
    <line x1="185" y1="170" x2="215" y2="170" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
    <!-- Tower cap -->
    <rect x="182" y="118" width="36" height="8" rx="1" fill="url(#craneGold)"/>
    <circle cx="200" cy="118" r="3" fill="#C9A84C" filter="url(#craneGlow)"/>
  </g>

  <!-- PART 3: JIB ARM (id="crane-jib") — pivots from tower top -->
  <g id="crane-jib" transform-origin="200 122">
    <!-- Main jib beam -->
    <line x1="200" y1="122" x2="380" y2="105" stroke="#C9A84C" stroke-width="2.5"/>
    <!-- Bottom chord -->
    <line x1="200" y1="130" x2="380" y2="113" stroke="#C9A84C" stroke-width="1.5" opacity="0.7"/>
    <!-- Jib cross braces -->
    <line x1="220" y1="122" x2="240" y2="130" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
    <line x1="240" y1="122" x2="220" y2="130" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
    <line x1="250" y1="120" x2="270" y2="128" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
    <line x1="270" y1="120" x2="250" y2="128" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
    <line x1="280" y1="118" x2="300" y2="126" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
    <line x1="300" y1="118" x2="280" y2="126" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
    <line x1="310" y1="116" x2="330" y2="124" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
    <line x1="330" y1="116" x2="310" y2="124" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
    <line x1="340" y1="114" x2="360" y2="122" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
    <line x1="360" y1="114" x2="340" y2="122" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
    <!-- Counter-jib (back) -->
    <line x1="200" y1="122" x2="140" y2="115" stroke="#C9A84C" stroke-width="2"/>
    <line x1="200" y1="130" x2="140" y2="123" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
    <!-- Counterweight -->
    <rect x="130" y="115" width="16" height="14" rx="1" fill="url(#craneSteelGold)" stroke="#C9A84C" stroke-width="1"/>
    <!-- Jib tip pulley -->
    <circle cx="380" cy="109" r="4" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
    <circle cx="380" cy="109" r="1.5" fill="#C9A84C"/>
    <!-- Pendant lines (tower to jib support) -->
    <line x1="200" y1="118" x2="200" y2="90" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="200" y1="90" x2="380" y2="105" stroke="#C9A84C" stroke-width="0.8" opacity="0.6"/>
    <line x1="200" y1="90" x2="140" y2="115" stroke="#C9A84C" stroke-width="0.8" opacity="0.6"/>
    <!-- Mast peak -->
    <polygon points="196,90 204,90 200,78" fill="url(#craneGold)"/>
  </g>

  <!-- PART 4: CABLE (id="crane-cable") — hangs from jib tip -->
  <g id="crane-cable">
    <line x1="380" y1="113" x2="380" y2="350" stroke="#C9A84C" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.8"/>
  </g>

  <!-- PART 5: HOOK (id="crane-hook") — at cable end -->
  <g id="crane-hook">
    <!-- Hook block -->
    <rect x="373" y="345" width="14" height="10" rx="2" fill="url(#craneSteelGold)" stroke="#C9A84C" stroke-width="1"/>
    <!-- Sheave wheels -->
    <circle cx="377" cy="350" r="2" fill="#C9A84C" opacity="0.6"/>
    <circle cx="383" cy="350" r="2" fill="#C9A84C" opacity="0.6"/>
    <!-- Hook shape -->
    <path d="M380,355 L380,370 Q380,380 375,380 Q368,380 368,372 L368,368" 
          fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" filter="url(#craneGlow)"/>
    <!-- Hook tip -->
    <circle cx="368" cy="367" r="1.5" fill="#C9A84C"/>
  </g>
</svg>