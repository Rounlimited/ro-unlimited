<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="logoGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A88A3D"/>
      <stop offset="50%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#D4B965"/>
    </linearGradient>
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="#1A1A1A"/>
  <!-- Outer border -->
  <rect x="8" y="8" width="184" height="184" fill="none" stroke="url(#logoGold)" stroke-width="2.5"/>
  <!-- Corner bolts -->
  <circle cx="8" cy="8" r="3.5" fill="#C9A84C"/>
  <circle cx="192" cy="8" r="3.5" fill="#C9A84C"/>
  <circle cx="8" cy="192" r="3.5" fill="#C9A84C"/>
  <circle cx="192" cy="192" r="3.5" fill="#C9A84C"/>
  <!-- Inner corner brackets -->
  <path d="M20,20 L32,20 M20,20 L20,32" stroke="#C9A84C" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M180,20 L168,20 M180,20 L180,32" stroke="#C9A84C" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M20,180 L32,180 M20,180 L20,168" stroke="#C9A84C" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M180,180 L168,180 M180,180 L180,168" stroke="#C9A84C" stroke-width="1" opacity="0.3" fill="none"/>
  <!-- RoU text - using Oswald-like proportions -->
  <!-- R -->
  <text x="30" y="140" font-family="Oswald, Arial Black, sans-serif" font-weight="700" font-size="100" fill="url(#logoGold)" letter-spacing="-3">R</text>
  <!-- o (lowercase, smaller) -->
  <text x="85" y="140" font-family="Oswald, Arial Black, sans-serif" font-weight="500" font-size="72" fill="url(#logoGold)">o</text>
  <!-- U -->
  <text x="125" y="140" font-family="Oswald, Arial Black, sans-serif" font-weight="700" font-size="100" fill="url(#logoGold)" letter-spacing="-3">U</text>
  <!-- Accent line -->
  <rect x="30" y="152" width="140" height="1.5" fill="url(#logoGold)" opacity="0.4"/>
  <!-- Tagline -->
  <text x="100" y="173" font-family="Barlow, Arial, sans-serif" font-weight="400" font-size="11" fill="#C9A84C" opacity="0.6" text-anchor="middle" letter-spacing="4">UNLIMITED</text>
</svg>