<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Major grid lines -->
  <line x1="0" y1="0" x2="100" y2="0" stroke="#C9A84C" stroke-width="0.5" opacity="0.12"/>
  <line x1="0" y1="50" x2="100" y2="50" stroke="#C9A84C" stroke-width="0.5" opacity="0.12"/>
  <line x1="0" y1="0" x2="0" y2="100" stroke="#C9A84C" stroke-width="0.5" opacity="0.12"/>
  <line x1="50" y1="0" x2="50" y2="100" stroke="#C9A84C" stroke-width="0.5" opacity="0.12"/>
  <!-- Minor grid lines -->
  <line x1="0" y1="10" x2="100" y2="10" stroke="#C9A84C" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="20" x2="100" y2="20" stroke="#C9A84C" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="30" x2="100" y2="30" stroke="#C9A84C" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="40" x2="100" y2="40" stroke="#C9A84C" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="60" x2="100" y2="60" stroke="#C9A84C" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="70" x2="100" y2="70" stroke="#C9A84C" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="80" x2="100" y2="80" stroke="#C9A84C" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="90" x2="100" y2="90" stroke="#C9A84C" stroke-width="0.3" opacity="0.05"/>
  <line x1="10" y1="0" x2="10" y2="100" stroke="#C9A84C" stroke-width="0.3" opacity="0.05"/>
  <line x1="20" y1="0" x2="20" y2="100" stroke="#C9A84C" stroke-width="0.3" opacity="0.05"/>
  <line x1="30" y1="0" x2="30" y2="100" stroke="#C9A84C" stroke-width="0.3" opacity="0.05"/>
  <line x1="40" y1="0" x2="40" y2="100" stroke="#C9A84C" stroke-width="0.3" opacity="0.05"/>
  <line x1="60" y1="0" x2="60" y2="100" stroke="#C9A84C" stroke-width="0.3" opacity="0.05"/>
  <line x1="70" y1="0" x2="70" y2="100" stroke="#C9A84C" stroke-width="0.3" opacity="0.05"/>
  <line x1="80" y1="0" x2="80" y2="100" stroke="#C9A84C" stroke-width="0.3" opacity="0.05"/>
  <line x1="90" y1="0" x2="90" y2="100" stroke="#C9A84C" stroke-width="0.3" opacity="0.05"/>
  <!-- Dimension marks at intersections -->
  <circle cx="0" cy="0" r="1" fill="#C9A84C" opacity="0.08"/>
  <circle cx="50" cy="0" r="1" fill="#C9A84C" opacity="0.08"/>
  <circle cx="0" cy="50" r="1" fill="#C9A84C" opacity="0.08"/>
  <circle cx="50" cy="50" r="1" fill="#C9A84C" opacity="0.08"/>
</svg>