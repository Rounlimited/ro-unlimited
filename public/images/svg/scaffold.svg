  <line class="scaffold-x4" x1="274" y1="102" x2="26" y2="198" stroke="#C9A84C" stroke-width="1.5" opacity="0.4"/>
  <line class="scaffold-x5" x1="26" y1="202" x2="274" y2="298" stroke="#C9A84C" stroke-width="1.5" opacity="0.4"/>
  <line class="scaffold-x6" x1="274" y1="202" x2="26" y2="298" stroke="#C9A84C" stroke-width="1.5" opacity="0.4"/>
  <line class="scaffold-x7" x1="26" y1="302" x2="274" y2="396" stroke="#C9A84C" stroke-width="1.5" opacity="0.4"/>
  <line class="scaffold-x8" x1="274" y1="302" x2="26" y2="396" stroke="#C9A84C" stroke-width="1.5" opacity="0.4"/>
