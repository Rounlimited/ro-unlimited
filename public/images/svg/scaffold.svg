<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="scaffGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A88A3D;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#A88A3D;stop-opacity:0.8"/>
