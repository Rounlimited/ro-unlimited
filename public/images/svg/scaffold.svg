  <line class="scaffold-x1" x1="26" y1="4" x2="274" y2="98" stroke="#C9A84C" stroke-width="1.5" opacity="0.4"/>
  <line class="scaffold-x2" x1="274" y1="4" x2="26" y2="98" stroke="#C9A84C" stroke-width="1.5" opacity="0.4"/>
