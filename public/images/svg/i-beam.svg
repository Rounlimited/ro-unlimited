<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 40" width="800" height="40">
  <defs>
    <linearGradient id="beamGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B965"/>
      <stop offset="20%" style="stop-color:#C9A84C"/>
      <stop offset="50%" style="stop-color:#8A7233"/>
      <stop offset="80%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#D4B965"/>
    </linearGradient>
    <linearGradient id="flangeGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#A88A3D"/>
    </linearGradient>
  </defs>
  <!-- Top flange -->
  <rect x="0" y="0" width="800" height="6" rx="1" fill="url(#flangeGold)"/>
